name: Build Aegis DIM Wishlist From Excel

on:
  workflow_dispatch:
  push:
    paths:
      - "data.xlsx"
      - "build_aegis_wishlist.py"
      - ".github/workflows/build-aegis-from-excel.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl

      - name: Build DIM wishlist files
        env:
          BUNGIE_API_KEY: ${{ secrets.BUNGIE_API_KEY }}
        run: |
          python build_aegis_wishlist.py \
            --excel data.xlsx \
            --outdir .

      - name: Commit generated wishlist files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add Aegis-Endgame-*.txt
          git add Aegis-Unresolved-Names.csv

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Build Aegis DIM wishlist from current Excel"
            git push
          fi
